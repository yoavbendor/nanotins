name: ci

# Configure the whole suite and run the smoke tests on Linux. The libraries are header-only and pull their
# own dependencies (nanoarrow, header-only boost, stdexec) via FetchContent, so the job is self-contained.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        compiler:
          - { cc: gcc-13, cxx: g++-13 }
          - { cc: clang-18, cxx: clang++-18 }
    env:
      CC: ${{ matrix.compiler.cc }}
      CXX: ${{ matrix.compiler.cxx }}
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build ${{ matrix.compiler.cxx }}
          pip install fastavro

      - name: Configure
        run: cmake -S . -B build -G Ninja -DNANOTINS_SUITE_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build

      - name: Test (smoke)
        run: ctest --test-dir build -L smoke --output-on-failure
